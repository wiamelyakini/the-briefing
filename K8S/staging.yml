---
apiVersion: v1
kind: Namespace
metadata:
  name: staging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: the-briefing-deployment
  namespace: staging
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: the-briefing
  template:
    metadata:
      labels:
        app: the-briefing
    spec:
      containers:
      - name: the-briefing-container
        image: wiameelyakini/the-briefing:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: the-briefing-service
  namespace: staging
spec:
  type: LoadBalancer
  selector:
    app: the-briefing
  ports:
  - port: 80
    targetPort: 3000
